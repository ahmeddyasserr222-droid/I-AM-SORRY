<!DOCTYPE html>
<html>
<head>

<title>Sorry</title>

<style>
body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
color:white;
font-family:Arial;
}

h1{
font-size:50px;
text-align:center;
animation:fade 2s;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:30px;
background:#ffffff;
color:#000;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>

</head>

<body>

<h1>I am sorry kont naym oxembellah</h1>

<button onclick="startHearts()">Forgive me</button>

<script>
// دالة انشاء قلب أبيض واحد
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}

// دالة تفعيل القلوب عند الضغط على الزرار
function startHearts(){
setInterval(createHeart,200);
}

</script>

</body>
</html>
